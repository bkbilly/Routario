<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Reports - Routario</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" href="/icons/favicon.ico">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/device-management.css">
    <script src="js/settings-nav.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.js"></script>
    <style>
        .report-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: flex-end;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
        }
        .report-controls .form-group { margin: 0; }
        .report-controls .form-label { font-size: 0.78rem; margin-bottom: 0.3rem; }
        .report-controls .form-input { min-width: 140px; }
        .summary-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .summary-card {
            flex: 1;
            min-width: 120px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.9rem 1.1rem;
        }
        .summary-card .val {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-primary);
            font-family: var(--font-mono);
        }
        .summary-card .lbl {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }
        .report-table { width: 100%; border-collapse: collapse; }
        .report-table th, .report-table td {
            padding: 0.65rem 0.9rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.875rem;
        }
        .report-table th {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .report-table th:hover { color: var(--text-primary); }
        .report-table tr:hover td { background: var(--bg-tertiary); }
        .report-table .total-row td {
            font-weight: 600;
            border-top: 2px solid var(--border-color);
            color: var(--accent-primary);
        }
        .no-data { text-align: center; color: var(--text-muted); padding: 3rem 1rem; }
        .sort-arrow { font-size: 0.7rem; margin-left: 0.2rem; }

        /* Custom vehicle multi-select */
        .veh-select-wrap {
            position: relative;
            min-width: 190px;
        }
        .veh-select-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .veh-select-btn span { flex: 1; overflow: hidden; text-overflow: ellipsis; }
        .veh-select-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            min-width: 220px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            z-index: 200;
            max-height: 240px;
            overflow-y: auto;
            padding: 0.4rem 0;
        }
        .veh-select-wrap.open .veh-select-dropdown { display: block; }
        .veh-opt {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.85rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: background 0.15s;
        }
        .veh-opt:hover { background: var(--bg-tertiary); }
        .veh-opt input[type=checkbox] { accent-color: var(--accent-primary); flex-shrink: 0; }
        .veh-opt-divider { height: 1px; background: var(--border-color); margin: 0.3rem 0; }
#tripMapModal .modal-content { max-width: 900px; width: 95vw; max-height: 90vh; padding: 0; display: flex; flex-direction: column; }
        #tripMapModal .modal-header { padding: 1rem 1.25rem 0.75rem; flex-shrink: 0; }
        #tripMapMeta { padding: 0 1.25rem 0.75rem; font-size: 0.8rem; color: var(--text-muted); flex-shrink: 0; }
        @media (max-width: 600px) {
            #tripMapModal .modal-title { font-size: 1.1rem; }
        }
        #tripMapWrap { position: relative; flex: 1; min-height: 300px; }
        #tripMapContainer { height: 100%; }
        #tripMapSpinner { display:none; position:absolute; inset:0; align-items:center; justify-content:center; background:var(--bg-card); color:var(--text-muted); gap:0.5rem; font-size:0.9rem; z-index:1000; }
    </style>
</head>
<body>
<div class="container">

    <div class="report-controls">
        <div class="form-group">
            <label class="form-label">Report Type</label>
            <select id="reportType" class="form-input" onchange="onReportTypeChange()">
                <option value="summary">Fleet Summary</option>
                <option value="trips">Trip List</option>
                <option value="daily">Daily Activity</option>
                <option value="sensors">Vehicle Sensors</option>
            </select>
        </div>
        <div class="form-group" id="historyCheckGroup" style="display:none;">
            <label class="form-label">&nbsp;</label>
            <label class="form-input" style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;min-width:unset;">
                <input type="checkbox" id="historyCheck" onchange="onHistoryCheckChange()" style="accent-color:var(--accent-primary);">
                Historical data
            </label>
        </div>
        <div class="form-group" id="dateFromGroup">
            <label class="form-label">From</label>
            <input type="date" id="startDate" class="form-input">
        </div>
        <div class="form-group" id="dateToGroup">
            <label class="form-label">To</label>
            <input type="date" id="endDate" class="form-input">
        </div>
        <div class="form-group">
            <label class="form-label">Vehicles</label>
            <div class="veh-select-wrap" id="vehSelectWrap">
                <button type="button" class="form-input veh-select-btn" onclick="toggleVehDropdown(event)">
                    <span id="vehSelectLabel">All vehicles</span>
                    <i class="mdi mdi-chevron-down" style="font-size:1rem;flex-shrink:0;"></i>
                </button>
                <div class="veh-select-dropdown" id="vehDropdown">
                    <label class="veh-opt">
                        <input type="checkbox" id="allVehCheck" checked onchange="toggleAllVehicles(this)">
                        <span>All vehicles</span>
                    </label>
                    <div class="veh-opt-divider"></div>
                    <div id="vehOptsList"></div>
                </div>
            </div>
        </div>
        <button class="btn btn-primary" onclick="generateReport()">
            <i class="mdi mdi-chart-bar"></i> Generate
        </button>
        <button class="btn btn-secondary" id="exportCsvBtn" onclick="exportCsv()" style="display:none;">
            <i class="mdi mdi-download"></i> Export CSV
        </button>
    </div>

    <p id="reportDescription" style="margin:-0.75rem 0 1.25rem;font-size:0.85rem;color:var(--text-muted);"></p>

    <div class="summary-bar" id="summaryBar" style="display:none;"></div>

    <div style="overflow-x:auto;">
        <table class="report-table" id="reportTable" style="display:none;">
            <thead id="reportHead"></thead>
            <tbody id="reportBody"></tbody>
        </table>
    </div>
    <div class="no-data" id="noData" style="display:none;">No trip data found for the selected period.</div>

</div>

<!-- Trip Map Modal -->
<div class="modal" id="tripMapModal">
    <div class="modal-backdrop" onclick="closeTripMap()"></div>
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title" id="tripMapTitle">Trip</h3>
            <button class="modal-close" onclick="closeTripMap()">&times;</button>
        </div>
        <div id="tripMapMeta"></div>
        <div id="tripMapWrap">
            <div id="tripMapContainer"></div>
            <div id="tripMapSpinner"><i class="mdi mdi-loading mdi-spin"></i> Loading positions…</div>
        </div>
    </div>
</div>
<script src="js/config.js"></script>
<script src="js/vehicle-icons.js"></script>
<script src="js/reports.js"></script>
<script src="js/voice-ptt.js"></script>
</body>
</html>
